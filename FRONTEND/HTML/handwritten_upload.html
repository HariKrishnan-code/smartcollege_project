<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Handwritten Assignment Upload</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .box{

            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;

        }

        input{

            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;

        }

        button{

            width:100%;
            padding:12px;
            border:none;
            background:#0b7dda;
            color:white;
            cursor:pointer;

        }

        #result{

            margin-top:30px;

        }

        pre{

            background:#efefef;
            padding:15px;

        }

    </style>

</head>

<body>

<div class="box">

<h2>Upload Handwritten Assignment</h2>

<input
type="file"
id="assignment"
accept=".pdf"
>

<button onclick="uploadAssignment()">

Verify Assignment

</button>

<div id="result"></div>

</div>

<script src="../JAVA SCRIPT/handwritten_upload.js"></script>

</body>

</html>
