<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Login Portal</title>
    <link rel="stylesheet" href="instution.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="login-box">
        <h1>Institution Login Portal</h1>

        <form>
            <div class="input-box">
                <input type="text" placeholder="Institution ID / Username" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember Me</label>
                <a href="institution forget password.html">Forgot Password?</a>
            </div>

            <button onclick="goinstitutiondashboard()" type="submit">Log in</button>

            <p class="register">
                Need access? <a href="institution_register.html">REGISTER</a>
            </p>
        </form>
    </div>
    
    <script>
        function goinstitutiondashboard() {
            window.location.href = "institution_dashboard.html"; // your institution dashboard page
        } </script>
        
</body>
</html>
