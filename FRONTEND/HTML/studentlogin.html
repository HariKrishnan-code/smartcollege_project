<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Login</title>
    <link rel="stylesheet" href="../CSS/student login.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="login-box">
        <h1>Students Login</h1>

        <form onsubmit="return false;">
            <div class="input-box">
<input
    type="text"
    id="username"
    placeholder="Username"
    required
>
            </div>

            <div class="input-box">
               <input
    type="password"
    id="password"
    placeholder="Password"
    required
>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember Me</label>
                <a href="student forget password.html">Forgot Password?</a>
            </div>

            <button onclick="studentdashboard()">Log in</button>

            <p class="register">
                Don't have an account? <a href="student_register.html">Register</a>
            </p>
        </form>
    </div>
 <script>

async function studentdashboard(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const response = await fetch(
        "http://127.0.0.1:5000/student_login",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                password
            })
        }
    );

    const data = await response.json();

    if(data.success){

        localStorage.setItem(
            "student_id",
            data.student_id
        );

        localStorage.setItem(
            "student_name",
            data.name
        );

        window.location.href =
            "student_dashboard.html";

    }
    else{

        alert(data.message);

    }

}

</script>

</body>
</html>
